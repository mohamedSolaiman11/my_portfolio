<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Mohamed Solaiman</title>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- Shared Theme Variables --- */
        :root[data-theme="dark"] {
            --primary-color: #027dfd;
            --bg-body: #0f172a;
            --surface: #1e293b;
            --surface-alt: #0f172a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.9);
            --border-color: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        :root[data-theme="light"] {
            --primary-color: #027dfd;
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --text-main: #0f172a;
            --text-dim: #475569;
            --nav-bg: rgba(248, 250, 252, 0.9);
            --border-color: rgba(0, 0, 0, 0.05);
            --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- Global Reset & Typography Fix --- */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s ease, color 0.3s ease; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.6; 
        }

        /* Safe Arabic Font Application */
        [lang="ar"] body, 
        [lang="ar"] button, 
        [lang="ar"] input, 
        [lang="ar"] textarea { 
            font-family: 'Cairo', sans-serif; 
        }

        /* Force Icons to stay FontAwesome */
        .fas, .fab, .far, .fa-solid, .fa-brands { 
            font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important; 
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.2rem; }

        /* Navigation */
        nav {
            position: fixed; top: 0; width: 100%; padding: 1.2rem 0;
            background: var(--nav-bg); backdrop-filter: blur(16px);
            z-index: 1000; border-bottom: 1px solid var(--border-color);
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--primary-color); }

        .nav-controls { display: flex; align-items: center; gap: 1rem; }
        .control-btn { 
            background: var(--surface-alt); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            width: 40px; height: 40px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: var(--transition);
        }

        /* Details Styles */
        .details-wrapper { padding: 120px 0; }
        .project-hero { margin-bottom: 60px; text-align: center; }
        .project-hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 10px; font-weight: 800; }
        .badge-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .badge { background: rgba(2, 125, 253, 0.1); color: var(--primary-color); padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; }
        
        .main-showcase { 
            width: 100%; max-height: 75vh; border-radius: 24px; overflow: hidden; margin-bottom: 25px; 
            box-shadow: var(--card-shadow); background: #0a0f1a; cursor: zoom-in;
            border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .main-showcase img { max-width: 100%; max-height: 70vh; object-fit: contain; transition: transform 0.3s ease; border-radius: 12px; }
        
        .thumbnails-grid { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; justify-content: center; }
        .thumbnail { height: 100px; width: auto; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: var(--transition); background: #111; flex-shrink: 0; }
        .thumbnail img { height: 100%; width: auto; object-fit: contain; opacity: 0.5; transition: 0.3s; }
        .thumbnail.active { border-color: var(--primary-color); background: rgba(2, 125, 253, 0.1); }
        .thumbnail.active img { opacity: 1; }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 60px; }
        .story-section { margin-bottom: 40px; }
        .story-section h2 { font-size: 1.8rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .story-section h2 i { color: var(--primary-color); }
        .story-section p { color: var(--text-dim); font-size: 1.1rem; line-height: 1.8; }

        .sidebar-card { background: var(--surface); padding: 30px; border-radius: 24px; position: sticky; top: 120px; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); }
        .sidebar-card h3 { margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .spec-item { margin-bottom: 20px; }
        .spec-item label { display: block; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
        .spec-item span { font-weight: 600; color: var(--text-main); }

        .btn-primary { background: var(--primary-color); color: #fff !important; padding: 0.9rem 2rem; border-radius: 12px; text-decoration: none; font-weight: 700; display: inline-block; transition: var(--transition); border: 2px solid var(--primary-color); }
        .btn-outline { border: 2px solid var(--border-color); color: var(--text-main); padding: 0.9rem 2rem; border-radius: 12px; text-decoration: none; font-weight: 700; display: inline-block; transition: var(--transition); }
        
        .tag { font-size: 0.75rem; color: #38bdf8; background: rgba(56, 189, 248, 0.1); padding: 0.3rem 0.8rem; border-radius: 50px; font-weight: 600; margin-right: 5px; }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; object-fit: contain; }

        .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-left-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 992px) {
            .content-grid { grid-template-columns: 1fr; }
            .thumbnails-grid { justify-content: flex-start; }
            .sidebar-card { position: static; margin-top: 40px; }
        }

        /* RTL Adjustments */
        [dir="rtl"] .tag { margin-right: 0; margin-left: 5px; }
        [dir="rtl"] .story-section h2 i { margin-left: 10px; margin-right: 0; }
        [dir="rtl"] .nav-controls { flex-direction: row-reverse; }
    </style>
</head>
<body>

    <nav>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="logo">M.<span>Solaiman</span></a>
            
            <div class="nav-controls">
                <button class="control-btn theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                <button class="control-btn lang-switch" onclick="toggleLanguage()">AR</button>
                <a href="index.html" style="color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; margin-left: 10px;">
                    <i class="fas fa-arrow-left"></i> <span data-i18n="back_to_projects">Back to Projects</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container details-wrapper" id="details-content">
        <div style="text-align: center; padding: 100px;">
            <div class="spinner"></div>
            <p data-i18n="loading">Loading project details...</p>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="Full preview">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAFGihdfZEWJM7iJYh45wRWYCYphVG4-G0",
            authDomain: "portfolio-9fd63.firebaseapp.com",
            projectId: "portfolio-9fd63",
            storageBucket: "portfolio-9fd63.appspot.com",
            messagingSenderId: "562837517190",
            appId: "1:562837517190:web:173b5edb9f4ebdafdf7207"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const translations = {
            en: {
                back_to_projects: "Back to Projects",
                loading: "Loading project details...",
                specs_title: "Project Specs",
                label_tech: "Technologies",
                label_platform: "Main Platform",
                btn_source: "View Source",
                btn_contact: "Contact Me",
                problem_title: "The Problem",
                solution_title: "The Solution",
                video_title: "Video Demo"
            },
            ar: {
                back_to_projects: "العودة للمشاريع",
                loading: "جاري تحميل تفاصيل المشروع...",
                specs_title: "مواصفات المشروع",
                label_tech: "التقنيات المستخدمة",
                label_platform: "المنصة الرئيسية",
                btn_source: "عرض الكود",
                btn_contact: "تواصل معي",
                problem_title: "المشكلة",
                solution_title: "الحل",
                video_title: "عرض فيديو"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        let currentTheme = localStorage.getItem('theme') || 'dark';

        function updateUI() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.documentElement.setAttribute('lang', currentLang);
            document.documentElement.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            
            document.querySelectorAll('.theme-toggle i').forEach(i => i.className = currentTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon');
            document.querySelectorAll('.lang-switch').forEach(b => b.innerText = currentLang === 'en' ? 'AR' : 'EN');
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });

            loadProjectDetails();
        }

        window.toggleLanguage = () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('lang', currentLang);
            updateUI();
        };

        document.querySelectorAll('.theme-toggle').forEach(btn => {
            btn.onclick = () => {
                currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('theme', currentTheme);
                updateUI();
            };
        });

        async function loadProjectDetails() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const container = document.getElementById('details-content');

            if (!id) return;

            try {
                const docSnap = await getDoc(doc(db, "projects", id));
                if (!docSnap.exists()) {
                    container.innerHTML = "<h2>Project not found.</h2>";
                    return;
                }

                const p = docSnap.data();
                
                // Localization Logic
                const appName = currentLang === 'ar' && p.appName_ar ? p.appName_ar : (p.appName || p.name);
                const problem = currentLang === 'ar' && p.problem_ar ? p.problem_ar : (p.problem || 'Not specified');
                const solution = currentLang === 'ar' && p.solution_ar ? p.solution_ar : (p.solution || 'Not specified');
                const tagline = currentLang === 'ar' && p.tagline_ar ? p.tagline_ar : (p.tagline || '');

                const tags = p.techStack ? p.techStack.split(',').map(tag => `<span class="tag">${tag.trim()}</span>`).join('') : '';
                
                let allImages = [];
                if (p.coverImage) allImages.push(p.coverImage);
                if (p.screenshots && Array.isArray(p.screenshots)) allImages = [...allImages, ...p.screenshots];

                container.innerHTML = `
                    <div class="project-hero">
                        <div class="badge-group">
                            <span class="badge">${p.category || 'Mobile App'}</span>
                            <span class="badge">${p.status || 'Completed'}</span>
                            <span class="badge">${p.platforms || 'Android / iOS'}</span>
                        </div>
                        <h1>${appName}</h1>
                        <p style="font-size: 1.1rem; color: var(--text-dim); max-width: 700px; margin: 0 auto;">${tagline}</p>
                    </div>

                    <div class="gallery-container">
                        <div class="main-showcase" id="main-view" onclick="openLightbox(this.querySelector('img').src)">
                            <img src="${allImages[0] || 'https://via.placeholder.com/800x450'}" id="current-img" alt="Project main view">
                        </div>
                        
                        ${allImages.length > 1 ? `
                        <div class="thumbnails-grid">
                            ${allImages.map((img, index) => `
                                <div class="thumbnail ${index === 0 ? 'active' : ''}" onclick="switchImage('${img}', this)">
                                    <img src="${img}" alt="Thumbnail">
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}
                    </div>

                    <div class="content-grid">
                        <div class="main-content">
                            <div class="story-section">
                                <h2><i class="fas fa-bullseye"></i> ${translations[currentLang].problem_title}</h2>
                                <p>${problem.replace(/\n/g, '<br>')}</p>
                            </div>
                            <div class="story-section">
                                <h2><i class="fas fa-lightbulb"></i> ${translations[currentLang].solution_title}</h2>
                                <p>${solution.replace(/\n/g, '<br>')}</p>
                            </div>
                            ${p.videoLink ? `
                            <div class="story-section">
                                <h2><i class="fas fa-play-circle"></i> ${translations[currentLang].video_title}</h2>
                                <div style="position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; background: #000;">
                                    <iframe src="${formatVideoUrl(p.videoLink)}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;" allowfullscreen></iframe>
                                </div>
                            </div>` : ''}
                        </div>

                        <div class="sidebar">
                            <div class="sidebar-card">
                                <h3>${translations[currentLang].specs_title}</h3>
                                <div class="spec-item">
                                    <label>${translations[currentLang].label_tech}</label>
                                    <div class="tech-stack-tags" style="margin-top:10px;">${tags}</div>
                                </div>
                                <div class="spec-item">
                                    <label>${translations[currentLang].label_platform}</label>
                                    <span>${p.platforms || 'Flutter'}</span>
                                </div>
                                
                                <div style="display: grid; gap: 10px; margin-top: 30px;">
                                    ${p.githubLink ? `<a href="${p.githubLink}" target="_blank" class="btn-primary" style="text-align:center;"><i class="fab fa-github"></i> ${translations[currentLang].btn_source}</a>` : ''}
                                    <a href="https://wa.me/201014250577?text=Interested in: ${appName}" target="_blank" class="btn-outline" style="text-align:center;">${translations[currentLang].btn_contact}</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                window.switchImage = (src, thumbEl) => {
                    document.getElementById('current-img').src = src;
                    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                    thumbEl.classList.add('active');
                };

                window.openLightbox = (src) => {
                    const lightbox = document.getElementById('lightbox');
                    document.getElementById('lightbox-img').src = src;
                    lightbox.style.display = 'flex';
                };

            } catch (error) {
                container.innerHTML = "<h2>Error loading project.</h2>";
            }
        }

        function formatVideoUrl(url) {
            if (url.includes('youtube.com/watch?v=')) return url.replace('watch?v=', 'embed/');
            if (url.includes('youtu.be/')) return url.replace('youtu.be/', 'youtube.com/embed/');
            return url;
        }

        updateUI();
    </script>
</body>
</html>
